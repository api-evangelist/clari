name: Clari Rate Limits
description: >-
  Clari enforces rate limits at both the organization and API token level across
  its Revenue API and Copilot API. The Revenue API uses an asynchronous
  job-based model for exports, with limits on concurrent jobs and monthly export
  quotas. The data ingestion endpoints enforce per-token request rate limits.
  The Copilot API has its own separate rate limiting scheme.
specificationVersion: '0.1'
created: '2026-06-13'
modified: '2026-06-13'
rateLimits:
  - name: Revenue API - Concurrent Export Limit
    description: >-
      Maximum number of concurrent in-flight export jobs per organization. This
      applies to forecast exports, activity exports, and audit event exports.
    api: Clari Revenue API
    scope: Organization
    type: Concurrency
    limit: 3
    unit: concurrent jobs
    notes: Configurable per organization; contact Clari support to adjust.
  - name: Revenue API - Monthly Export Quota
    description: >-
      Maximum number of export jobs that can be initiated within a rolling
      30-day period at the organization level.
    api: Clari Revenue API
    scope: Organization
    type: Quota
    limit: 1000
    period: rolling 30 days
    unit: export jobs
    notes: Organization-level quota rolling over 30 days. Use GET /admin/limits to
      check current quota consumption.
  - name: Revenue API - Data Ingestion Rate Limit
    description: >-
      Maximum number of ingest requests per second per API token for the data
      ingestion endpoints (POST /ingest/entity/{entity} and POST
      /ingest/bulk/entity/{entity}).
    api: Clari Revenue API
    scope: Per API Token
    type: Rate
    limit: 100
    period: per second
    unit: requests
    notes: Limit is enforced per API token. Each ingest request supports up to 100
      records, and bulk ingest files up to 10MB.
  - name: Revenue API - Audit Events Pagination
    description: >-
      Maximum number of audit events returned per paginated request when
      querying GET /audit/events.
    api: Clari Revenue API
    scope: Per Request
    type: Pagination
    limit: 1000
    unit: records per request
    defaultValue: 100
    notes: Limit parameter range is 1–1000; default is 100.
  - name: Copilot API - Request Rate Limit
    description: >-
      Default rate limit for all Clari Copilot API endpoints.
    api: Clari Copilot API
    scope: Per API Key
    type: Rate
    limit: 10
    period: per second
    unit: requests
  - name: Copilot API - Weekly Request Quota
    description: >-
      Maximum number of requests allowed per week for the Clari Copilot API.
    api: Clari Copilot API
    scope: Per API Key
    type: Quota
    limit: 100000
    period: weekly
    unit: requests
    notes: Contact Clari support to increase weekly quota limits.
authentication:
  revenueAPI:
    type: API Key (Header)
    header: apikey
    notes: Generate token in Account Settings under "API Token". Store securely;
      cannot be retrieved after initial generation. Partner/ingest APIs also
      require a partnerkey header.
  copilotAPI:
    type: API Key (Header)
    headers:
      - X-Api-Key
      - X-Api-Password
    notes: Obtain credentials through the Copilot API integration guide.
