apis:
  - name: Clari Revenue API
    description: >-
      The Clari Revenue API provides programmatic access to forecast data,
      pipeline activity, audit events, and data ingestion capabilities. Built on
      REST principles with async job-based exports, the API supports exporting
      manual forecast submissions, activity records (meetings, emails,
      attachments), and audit event logs to data warehouses or BI tools.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developer.clari.com/
    baseURL: https://api.clari.com/v4
    tags:
      - Revenue Operations
      - Forecasting
      - Pipeline Management
      - Activity Intelligence
      - Data Export
      - Data Ingestion
    properties:
      - type: Documentation
        url: https://developer.clari.com/documentation/external_spec
      - type: OpenAPI
