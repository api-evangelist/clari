name: Clari
description: >-
  Clari is a revenue operations platform that provides a REST API for accessing
  pipeline data, forecasts, opportunity signals, activity intelligence, and
  CRM-enriched deal insights. The API enables revenue teams to programmatically
  export forecast submissions, query activity data (meetings, emails,
  attachments), and ingest custom entity data into the Clari platform. Clari
  also offers a Copilot API for accessing conversation intelligence data
  including call recordings, AI summaries, and coaching insights. The platform
  serves enterprise B2B organizations with tools to improve forecast accuracy,
  accelerate pipeline execution, and unify revenue operations across sales,
  marketing, and customer success teams.
