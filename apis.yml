      - type: Examples
        url: examples/clari-job-status-example.json
      - type: Examples
        url: examples/clari-activity-export-example.json
  - name: Clari Copilot API
    description: >-
      The Clari Copilot API provides access to conversation intelligence
      features including call recordings, AI-generated summaries, coaching
      insights, deal intelligence, and competitor tracking signals captured
      during sales meetings and calls.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://api-doc.copilot.clari.com/
